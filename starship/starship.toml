# ~/.config/starship.toml

add_newline = false
command_timeout = 1000
format = """(
$directory\
$env_var
$mise\
$python\
$rust\
$kubernetes\
$git_branch\
$git_status\
)$line_break$character"""

# Drop default prompt characters
[character]
success_symbol = ''
error_symbol = ''

# ---

[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Windows = 'Ņś¬ '
Arch = '¾░Żć'
CachyOS = '¾░Żć'
Ubuntu = '’īø'
Macos = '¾░ĆĄ'
Pop = '’īø'

# ---

# Shows current directory
[directory]
truncate_to_repo = false

# Shows current git branch
[git_branch]
symbol = '’ćÆ '
format = 'via [$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'ŌĆ”/'
style = 'bold green'

# Shows current git status
[git_status]
format = '([ \( $all_status$ahead_behind\)]($style) )'
style = 'bold green'
conflicted = '[’ü¬ ${count}](red) '
up_to_date = '[¾░śĮ ](green) '
untracked = '[¾░ŗŚ ${count}](red) '
ahead = '’é¬ ${count}'
diverged = '’é¬ ${ahead_count} ’é½ ${behind_count}'
behind = '’é½ ${count}'
stashed = '[’Ŗŗ stash=${count}](green) '
modified = '[¾░ø┐ ${count}](yellow) '
staged = '[¾░ÉŚ ${count}](green) '
renamed = '[¾▒ŹĖ ${count}](yellow) '
deleted = '[¾░ŹČ ${count}](red) '

# Shows kubernetes context and namespace
[kubernetes]
format = '[¾▒āŠ $context\($namespace\)](bold purple) '
disabled = false

[rust]
format = '[ŌÜÖ’ĖÅ $version](red bold) '
disabled = false

[python]
style = 'bold bright-green'
format = '[ŅłĄ ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[env_var]

[env_var.MISE]
variable = "MISE_ENV"
format = '[[$symbol$env_value ](bold red)]($style)'
symbol = "Ņ«Ż "

[mise]
disabled = false
format = '[[$symbol](bold green)]($style)'
symbol = "¾▒üż "
